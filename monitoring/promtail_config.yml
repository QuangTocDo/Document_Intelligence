server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docunder-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docunder
          __path__: /data/logs/*.log

    # Extract filename as a label to distinguish between gateway and dashboard logs
    relabel_configs:
      - source_labels: [__path__]
        regex: .*/([^/]+)\.log$
        target_label: service
